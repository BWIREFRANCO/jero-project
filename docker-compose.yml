# /var/www/jero.com/docker-compose.yml
version: '3.8'

services:
  web:
    build: .
    container_name: jero_web
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: jero_db
    environment:
      MYSQL_ROOT_PASSWORD: jero123
      MYSQL_DATABASE: jerodb
      MYSQL_USER: jerouser
      MYSQL_PASSWORD: jero123
    ports:
      - "3306:3306"
